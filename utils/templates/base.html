<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #222;
    padding: 2cm;
  }
  h1 { font-size: 18pt; margin-bottom: 4px; }
  h2 { font-size: 13pt; border-bottom: 1.5px solid #333; padding-bottom: 3px; margin: 18px 0 8px; }
  h3 { font-size: 11pt; font-weight: bold; margin-bottom: 2px; }
  p { margin-bottom: 8px; }
  ul { margin: 4px 0 8px 18px; }
  li { margin-bottom: 3px; }
  .contato { font-size: 10pt; color: #444; margin-bottom: 12px; }
  .meta { font-size: 10pt; color: #555; }
  .periodo { float: right; font-size: 10pt; color: #555; }
  .empresa-cargo { overflow: hidden; margin-bottom: 2px; }
  .section { margin-bottom: 16px; }
  a { color: #1a0dab; text-decoration: none; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
