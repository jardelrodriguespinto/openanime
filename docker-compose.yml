x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service"

services:

  neo4j:
    image: neo4j:5
    container_name: anime-neo4j
    labels:
      service: neo4j
    ports:
      - "${NEO4J_PORT_BROWZE:-7474}:7474"
      - "${NEO4J_PORT_BOLT:-7687}:7687"
    volumes:
      - ${HOST_DATA_DIR:-./data/neo4j/data}:/data
      - ${HOST_LOGS_DIR:-./data/neo4j/logs}:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:7.2.0-v13
    container_name: anime-redis
    labels:
      service: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${HOST_REDIS_DIR:-./data/redis}:/data
      - ./users.acl:/usr/local/etc/redis/users.acl:ro
    command: >
      redis-server
      --aclfile /usr/local/etc/redis/users.acl
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning --user open-anime -a open-anime ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: anime-postgres
    labels:
      service: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${HOST_PG_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-anime}
      - POSTGRES_USER=${POSTGRES_USER:-anime}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anime} -d ${POSTGRES_DB:-anime}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-bot
    labels:
      service: bot
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./:/app
      - ${HOST_SESSIONS_DIR:-./data/sessions}:/app/data/sessions
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BOT_WEBHOOK_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import bot.main; print('ok')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: anime-dashboard
    labels:
      service: dashboard
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${DASHBOARD_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import bot.dashboard; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped