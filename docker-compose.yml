x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service"

services:

  neo4j:
    image: neo4j:5
    container_name: anime-neo4j
    labels:
      service: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: anime-weaviate
    labels:
      service: weaviate
    ports:
      - "8080:8080"
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=text2vec-openai
      - ENABLE_MODULES=text2vec-openai
      - OPENAI_APIKEY=${OPENROUTER_API_KEY}
      - OPENAI_BASEURL=https://openrouter.ai/api/v1
      - CLUSTER_HOSTNAME=node1
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:7.2.0-v13
    container_name: anime-redis
    labels:
      service: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
      - ./users.acl:/usr/local/etc/redis/users.acl:ro
    command: >
      redis-server
      --aclfile /usr/local/etc/redis/users.acl
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning --user open-anime -a open-anime ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-bot
    labels:
      service: bot
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import bot.main; print('ok')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
